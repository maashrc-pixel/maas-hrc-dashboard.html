<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAAS HR Candidate Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
        }
        
        .header {
            background: white;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            border: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .header h1 {
            font-size: 24px;
            color: #333;
        }
        
        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #b22222;
            color: white;
        }
        
        .btn-primary:hover {
            background: #8b1a1a;
        }
        
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
            border: 1px solid #ccc;
        }
        
        .btn-secondary:hover {
            background: #d0d0d0;
        }
        
        .btn-small {
            padding: 0.3rem 0.6rem;
            font-size: 12px;
        }
        
        .btn-edit {
            background: #e3f2fd;
            color: #1976d2;
            border: 1px solid #90caf9;
        }
        
        .btn-delete {
            background: #ffebee;
            color: #d32f2f;
            border: 1px solid #ef5350;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 1.5rem;
        }
        
        .stat-card {
            background: white;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            text-align: center;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #333;
        }
        
        .stat-success { color: #2e7d32; }
        .stat-warning { color: #f57c00; }
        .stat-info { color: #1976d2; }
        
        .form-container {
            background: white;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            margin-bottom: 1.5rem;
        }
        
        .form-container h2 {
            margin-bottom: 1rem;
            font-size: 18px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 1rem;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: #555;
        }
        
        input, select, textarea {
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #b22222;
            box-shadow: 0 0 0 2px rgba(178, 34, 34, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .form-actions {
            display: flex;
            gap: 8px;
        }
        
        .filters {
            background: white;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            margin-bottom: 1rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }
        
        .table-container {
            background: white;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        th {
            background: #f5f5f5;
            padding: 0.75rem;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid #e0e0e0;
            color: #555;
        }
        
        td {
            padding: 0.75rem;
            border-bottom: 1px solid #f0f0f0;
        }
        
        tr:hover {
            background: #fafafa;
        }
        
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .badge-success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .badge-warning {
            background: #fff3e0;
            color: #f57c00;
        }
        
        .badge-info {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .badge-danger {
            background: #ffebee;
            color: #d32f2f;
        }
        
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #999;
        }
        
        .footer {
            text-align: center;
            padding: 1rem;
            color: #999;
            font-size: 12px;
            margin-top: 1rem;
        }
        
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            table {
                font-size: 12px;
            }
            
            td, th {
                padding: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MAAS HR Candidate Manager</h1>
            <button class="btn btn-primary" onclick="toggleForm()">+ Add Candidate</button>
        </div>
        
        <div class="stats-grid" id="statsGrid"></div>
        
        <div class="form-container" id="formContainer" style="display: none;">
            <h2 id="formTitle">Add New Candidate</h2>
            <form onsubmit="handleSubmit(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label>Phone *</label>
                        <input type="tel" id="phone" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email">
                    </div>
                </div>
                
                <div class="form-grid">
                    <div class="form-group">
                        <label>Position</label>
                        <select id="position">
                            <option>Security Guard</option>
                            <option>Cook</option>
                            <option>Waiter</option>
                            <option>Kitchen Helper</option>
                            <option>Cleaner</option>
                            <option>General Labor</option>
                            <option>Driver</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="location" placeholder="City name">
                    </div>
                    <div class="form-group">
                        <label>Expected Salary (AED)</label>
                        <input type="number" id="salaryExpected">
                    </div>
                </div>
                
                <div class="form-grid">
                    <div class="form-group">
                        <label>Employer</label>
                        <input type="text" id="employer">
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="status">
                            <option>Applied</option>
                            <option>Qualified</option>
                            <option>Shortlisted</option>
                            <option>Placed</option>
                            <option>Rejected</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Date Placed</label>
                        <input type="date" id="datePlaced">
                    </div>
                </div>
                
                <div class="form-grid">
                    <div class="form-group">
                        <label>Fee Amount (AED)</label>
                        <input type="number" id="feeAmount">
                    </div>
                    <div class="form-group">
                        <label>Cash Received</label>
                        <select id="cashReceived">
                            <option>No</option>
                            <option>Yes</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Payment Date</label>
                        <input type="date" id="paymentDate">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="notes"></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submitBtn">Add Candidate</button>
                    <button type="button" class="btn btn-secondary" onclick="toggleForm()">Cancel</button>
                </div>
            </form>
        </div>
        
        <div class="filters">
            <input type="text" id="searchInput" placeholder="Search name, phone, employer..." onkeyup="filterCandidates()">
            <select id="statusFilter" onchange="filterCandidates()">
                <option value="">All Status</option>
                <option>Applied</option>
                <option>Qualified</option>
                <option>Shortlisted</option>
                <option>Placed</option>
                <option>Rejected</option>
            </select>
            <select id="paymentFilter" onchange="filterCandidates()">
                <option value="">All Payment</option>
                <option value="Yes">Paid</option>
                <option value="No">Pending</option>
            </select>
        </div>
        
        <div class="table-container">
            <table id="candidatesTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Position</th>
                        <th>Status</th>
                        <th>Employer</th>
                        <th>Fee (AED)</th>
                        <th>Paid</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="candidatesBody">
                    <tr><td colspan="8" class="empty-state">No candidates added yet. Click "Add Candidate" to get started.</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="footer" id="footer">Data auto-saved locally • No registration required</div>
    </div>

    <script>
        let candidates = [];
        let editingId = null;

        // Load candidates from localStorage
        function loadCandidates() {
            const saved = localStorage.getItem('maashrCandidates');
            candidates = saved ? JSON.parse(saved) : [];
            renderCandidates();
            updateStats();
        }

        // Save candidates to localStorage
        function saveCandidates() {
            localStorage.setItem('maashrCandidates', JSON.stringify(candidates));
        }

        // Toggle form visibility
        function toggleForm() {
            const form = document.getElementById('formContainer');
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
            if (form.style.display === 'block') {
                clearForm();
            }
        }

        // Clear form
        function clearForm() {
            document.getElementById('name').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('email').value = '';
            document.getElementById('position').value = 'Security Guard';
            document.getElementById('location').value = '';
            document.getElementById('salaryExpected').value = '';
            document.getElementById('employer').value = '';
            document.getElementById('status').value = 'Applied';
            document.getElementById('datePlaced').value = '';
            document.getElementById('feeAmount').value = '';
            document.getElementById('cashReceived').value = 'No';
            document.getElementById('paymentDate').value = '';
            document.getElementById('notes').value = '';
            editingId = null;
            document.getElementById('formTitle').textContent = 'Add New Candidate';
            document.getElementById('submitBtn').textContent = 'Add Candidate';
        }

        // Handle form submit
        function handleSubmit(e) {
            e.preventDefault();
            const candidate = {
                id: editingId || Date.now(),
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                position: document.getElementById('position').value,
                location: document.getElementById('location').value,
                salaryExpected: document.getElementById('salaryExpected').value,
                employer: document.getElementById('employer').value,
                status: document.getElementById('status').value,
                datePlaced: document.getElementById('datePlaced').value,
                feeAmount: document.getElementById('feeAmount').value,
                cashReceived: document.getElementById('cashReceived').value,
                paymentDate: document.getElementById('paymentDate').value,
                notes: document.getElementById('notes').value
            };

            if (editingId) {
                candidates = candidates.map(c => c.id === editingId ? candidate : c);
            } else {
                candidates.unshift(candidate);
            }

            saveCandidates();
            renderCandidates();
            updateStats();
            toggleForm();
        }

        // Edit candidate
        function editCandidate(id) {
            const candidate = candidates.find(c => c.id === id);
            if (!candidate) return;

            editingId = id;
            document.getElementById('name').value = candidate.name;
            document.getElementById('phone').value = candidate.phone;
            document.getElementById('email').value = candidate.email;
            document.getElementById('position').value = candidate.position;
            document.getElementById('location').value = candidate.location;
            document.getElementById('salaryExpected').value = candidate.salaryExpected;
            document.getElementById('employer').value = candidate.employer;
            document.getElementById('status').value = candidate.status;
            document.getElementById('datePlaced').value = candidate.datePlaced;
            document.getElementById('feeAmount').value = candidate.feeAmount;
            document.getElementById('cashReceived').value = candidate.cashReceived;
            document.getElementById('paymentDate').value = candidate.paymentDate;
            document.getElementById('notes').value = candidate.notes;
            document.getElementById('formTitle').textContent = 'Edit Candidate';
            document.getElementById('submitBtn').textContent = 'Update Candidate';
            document.getElementById('formContainer').style.display = 'block';
        }

        // Delete candidate
        function deleteCandidate(id) {
            if (confirm('Are you sure you want to delete this candidate?')) {
                candidates = candidates.filter(c => c.id !== id);
                saveCandidates();
                renderCandidates();
                updateStats();
            }
        }

        // Render candidates table
        function renderCandidates() {
            const tbody = document.getElementById('candidatesBody');
            const filtered = getFilteredCandidates();

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="empty-state">No candidates found</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(c => `
                <tr>
                    <td><strong>${c.name}</strong></td>
                    <td>${c.phone}</td>
                    <td>${c.position}</td>
                    <td><span class="badge ${getStatusBadgeClass(c.status)}">${c.status}</span></td>
                    <td>${c.employer || '-'}</td>
                    <td>${c.feeAmount ? 'AED ' + parseInt(c.feeAmount).toLocaleString() : '-'}</td>
                    <td><span class="badge ${c.cashReceived === 'Yes' ? 'badge-success' : 'badge-warning'}">${c.cashReceived}</span></td>
                    <td>
                        <button class="btn btn-small btn-edit" onclick="editCandidate(${c.id})">Edit</button>
                        <button class="btn btn-small btn-delete" onclick="deleteCandidate(${c.id})">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        // Get status badge class
        function getStatusBadgeClass(status) {
            if (status === 'Placed') return 'badge-success';
            if (status === 'Qualified') return 'badge-info';
            if (status === 'Rejected') return 'badge-danger';
            return 'badge-warning';
        }

        // Get filtered candidates
        function getFilteredCandidates() {
            let filtered = candidates;

            const search = document.getElementById('searchInput').value.toLowerCase();
            if (search) {
                filtered = filtered.filter(c => 
                    c.name.toLowerCase().includes(search) ||
                    c.phone.includes(search) ||
                    c.employer.toLowerCase().includes(search)
                );
            }

            const status = document.getElementById('statusFilter').value;
            if (status) {
                filtered = filtered.filter(c => c.status === status);
            }

            const payment = document.getElementById('paymentFilter').value;
            if (payment) {
                filtered = filtered.filter(c => c.cashReceived === payment);
            }

            return filtered;
        }

        // Filter candidates
        function filterCandidates() {
            renderCandidates();
        }

        // Update stats
        function updateStats() {
            const stats = {
                total: candidates.length,
                placed: candidates.filter(c => c.status === 'Placed').length,
                paid: candidates.filter(c => c.cashReceived === 'Yes').length,
                pending: candidates.filter(c => c.cashReceived === 'No' && c.status === 'Placed').length,
                totalRevenue: candidates.filter(c => c.cashReceived === 'Yes').reduce((sum, c) => sum + (parseFloat(c.feeAmount) || 0), 0),
                pendingRevenue: candidates.filter(c => c.cashReceived === 'No' && c.status === 'Placed').reduce((sum, c) => sum + (parseFloat(c.feeAmount) || 0), 0)
            };

            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">Total Candidates</div>
                    <div class="stat-value">${stats.total}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Placed</div>
                    <div class="stat-value stat-success">${stats.placed}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Paid</div>
                    <div class="stat-value stat-success">${stats.paid}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Pending Payment</div>
                    <div class="stat-value stat-warning">${stats.pending}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Revenue (Paid)</div>
                    <div class="stat-value stat-info">AED ${Math.round(stats.totalRevenue).toLocaleString()}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Revenue (Pending)</div>
                    <div class="stat-value stat-warning">AED ${Math.round(stats.pendingRevenue).toLocaleString()}</div>
                </div>
            `;
        }

        // Initialize
        loadCandidates();
    </script>
</body>
</html>
